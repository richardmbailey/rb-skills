  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {

}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);

.form-range:disabled {

.btn:not(.btn-primary, .viz-tile):is(

&lt;div id=&quot;safe-process-guide&quot;&gt;
  &lt;style&gt;
    #safe-process-guide {
      --safe: var(--viz-series-3);
      --caution: var(--viz-series-2);
      --planned: var(--viz-series-5);
      --control: var(--viz-series-1);
      --agent: var(--viz-series-6);
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 100%;
      color: var(--foreground);
    }

    #safe-process-guide .hero {
      display: grid;
      gap: 14px;
      padding-block: 18px 8px;
      border-bottom: 1px solid var(--border);
    }

    #safe-process-guide .eyebrow,
    #safe-process-guide .kicker {
      color: var(--muted-foreground);
      font-size: var(--font-size-small);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #safe-process-guide .hero p {
      max-width: 68ch;
      color: var(--muted-foreground);
    }

    #safe-process-guide .status-row,
    #safe-process-guide .legend,
    #safe-process-guide .inline-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      align-items: center;
    }

    #safe-process-guide .status {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      padding: 3px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: var(--font-size-small);
    }

    #safe-process-guide .dot,
    #safe-process-guide .legend-mark {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--control);
    }

    #safe-process-guide .dot.safe,
    #safe-process-guide .legend-mark.safe { background: var(--safe); }
    #safe-process-guide .dot.caution,
    #safe-process-guide .legend-mark.caution { background: var(--caution); }
    #safe-process-guide .dot.planned,
    #safe-process-guide .legend-mark.planned { background: var(--planned); }
    #safe-process-guide .legend-mark.agent { background: var(--agent); }

    #safe-process-guide .toc {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px 18px;
      padding-block: 4px;
    }

    #safe-process-guide .toc a {
      padding-block: 4px;
      border-bottom: 1px solid var(--border);
    }

    #safe-process-guide section {
      display: grid;
      gap: 14px;
      scroll-margin-top: 16px;
    }

    #safe-process-guide section + section {
      padding-top: 26px;
      border-top: 1px solid var(--border);
    }

    #safe-process-guide .lead {
      max-width: 72ch;
      color: var(--muted-foreground);
    }

    #safe-process-guide .callout {
      border-left: 4px solid var(--control);
    }

    #safe-process-guide .callout.safe { border-left-color: var(--safe); }
    #safe-process-guide .callout.caution { border-left-color: var(--caution); }
    #safe-process-guide .callout.planned { border-left-color: var(--planned); }

    #safe-process-guide .callout p + p,
    #safe-process-guide .prose p + p {
      margin-top: 9px;
    }

    #safe-process-guide .diagram-wrap {
      display: grid;
      gap: 8px;
    }

    #safe-process-guide .diagram {
      display: block;
      width: 100%;
      height: auto;
      color: var(--foreground);
      overflow: visible;
    }

    #safe-process-guide .diagram .node {
      fill: var(--card);
      stroke: var(--border);
      stroke-width: 1.5;
    }

    #safe-process-guide .diagram .node-control {
      fill: color-mix(in srgb, var(--control) 15%, transparent);
      stroke: var(--control);
    }

    #safe-process-guide .diagram .node-safe {
      fill: color-mix(in srgb, var(--safe) 15%, transparent);
      stroke: var(--safe);
    }

    #safe-process-guide .diagram .node-caution {
      fill: color-mix(in srgb, var(--caution) 15%, transparent);
      stroke: var(--caution);
    }

    #safe-process-guide .diagram .node-planned {
      fill: color-mix(in srgb, var(--planned) 15%, transparent);
      stroke: var(--planned);
    }

    #safe-process-guide .diagram .node-agent {
      fill: color-mix(in srgb, var(--agent) 15%, transparent);
      stroke: var(--agent);
    }

    #safe-process-guide .diagram .edge {
      fill: none;
      stroke: var(--muted-foreground);
      stroke-width: 1.6;
    }

    #safe-process-guide .diagram .edge-safe { stroke: var(--safe); }
    #safe-process-guide .diagram .edge-caution { stroke: var(--caution); }
    #safe-process-guide .diagram .edge-planned { stroke: var(--planned); }
    #safe-process-guide .diagram text {
      fill: var(--foreground);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 400;
      text-anchor: middle;
    }

    #safe-process-guide .diagram .small {
      fill: var(--muted-foreground);
      font-size: 10.5px;
    }

    #safe-process-guide .diagram .label {
      font-weight: 500;
    }

    #safe-process-guide .caption {
      color: var(--muted-foreground);
      font-size: var(--font-size-small);
    }

    #safe-process-guide .steps {
      display: grid;
      gap: 0;
      counter-reset: safe-step;
    }

    #safe-process-guide .step {
      position: relative;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 12px;
      padding-bottom: 18px;
      counter-increment: safe-step;
    }

    #safe-process-guide .step::before {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border: 1px solid var(--control);
      border-radius: 50%;
      color: var(--foreground);
      background: color-mix(in srgb, var(--control) 12%, var(--background));
      content: counter(safe-step);
      font-weight: 500;
      z-index: 1;
    }

    #safe-process-guide .step::after {
      position: absolute;
      top: 32px;
      bottom: 0;
      left: 16px;
      width: 1px;
      background: var(--border);
      content: &quot;&quot;;
    }

    #safe-process-guide .step:last-child::after { display: none; }
    #safe-process-guide .step h3 { margin-bottom: 5px; }
    #safe-process-guide .step p { color: var(--muted-foreground); }

    #safe-process-guide .two-col,
    #safe-process-guide .three-col {
      display: grid;
      gap: 12px;
    }

    #safe-process-guide .two-col { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    #safe-process-guide .three-col { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    #safe-process-guide .mini-card {
      min-width: 0;
    }

    #safe-process-guide .mini-card h3,
    #safe-process-guide .mini-card h4 {
      margin-bottom: 6px;
    }

    #safe-process-guide .mini-card p,
    #safe-process-guide .mini-card li {
      color: var(--muted-foreground);
    }

    #safe-process-guide ul,
    #safe-process-guide ol {
      margin: 0;
      padding-inline-start: 20px;
    }

    #safe-process-guide li + li { margin-top: 5px; }

    #safe-process-guide .plain-list {
      display: grid;
      gap: 7px;
      padding: 0;
      list-style: none;
    }

    #safe-process-guide .plain-list li {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }

    #safe-process-guide .check {
      color: var(--safe);
      font-weight: 500;
    }

    #safe-process-guide .stop {
      color: var(--caution);
      font-weight: 500;
    }

    #safe-process-guide .planned-text {
      color: var(--planned);
      font-weight: 500;
    }

    #safe-process-guide .code-block {
      margin: 0;
      padding: 12px;
      overflow-x: auto;
      border-radius: var(--radius-lg);
      color: var(--foreground);
      background: var(--muted);
      font-family: var(--font-mono);
      font-size: var(--font-size-small);
      white-space: pre-wrap;
    }

    #safe-process-guide details {
      padding-block: 8px;
      border-bottom: 1px solid var(--border);
    }

    #safe-process-guide summary {
      cursor: pointer;
      font-weight: 500;
    }

    #safe-process-guide details &gt; div {
      padding-top: 9px;
      color: var(--muted-foreground);
    }

    #safe-process-guide .table td:first-child,
    #safe-process-guide .table th:first-child {
      width: 27%;
    }

    #safe-process-guide .table .current-cell {
      border-left: 3px solid var(--safe);
      padding-left: 10px;
    }

    #safe-process-guide .table .planned-cell {
      border-left: 3px solid var(--planned);
      padding-left: 10px;
    }

    #safe-process-guide .footer {
      display: grid;
      gap: 8px;
      padding-block: 18px;
      border-top: 1px solid var(--border);
      color: var(--muted-foreground);
      font-size: var(--font-size-small);
    }

    @media (max-width: 620px) {
      #safe-process-guide .toc,
      #safe-process-guide .two-col,
      #safe-process-guide .three-col {
        grid-template-columns: 1fr;
      }

      #safe-process-guide .table td:first-child,
      #safe-process-guide .table th:first-child {
        width: auto;
      }
    }

    @media print {
      #safe-process-guide {
        gap: 18px;
      }

      #safe-process-guide section + section {
        break-before: auto;
      }

      #safe-process-guide details &gt; div {
        display: block;
      }
    }
  &lt;/style&gt;

  &lt;header class=&quot;hero&quot;&gt;
    &lt;div class=&quot;eyebrow&quot;&gt;RB agent skills · safe-operation guide&lt;/div&gt;
    &lt;h1&gt;How the RB safe-operation process works&lt;/h1&gt;
    &lt;p&gt;This guide explains the optional constrained route that turns one implementation phase into a typed contract, assesses it, executes only an unchanged approved bundle, and verifies the result. It also explains the planned project-policy extension without pretending that extension is already available.&lt;/p&gt;
    &lt;div class=&quot;status-row&quot; aria-label=&quot;Availability summary&quot;&gt;
      &lt;span class=&quot;status&quot;&gt;&lt;span class=&quot;dot safe&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;Current: three constrained skills and runtime&lt;/span&gt;
      &lt;span class=&quot;status&quot;&gt;&lt;span class=&quot;dot caution&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;Current assurance: semi-formal, not a sandbox&lt;/span&gt;
      &lt;span class=&quot;status&quot;&gt;&lt;span class=&quot;dot planned&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;Planned: natural-language project policy&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;caption&quot;&gt;Evidence snapshot reviewed 19 July 2026 · runtime 0.1.0 · artifact schema 1.0&lt;/p&gt;
  &lt;/header&gt;

  &lt;nav aria-label=&quot;Guide contents&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;Contents&lt;/div&gt;

  &lt;section id=&quot;purpose&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;1 · Purpose&lt;/div&gt;
    &lt;h2&gt;Why add a “safe” route at all?&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;An ordinary coding agent is good at adapting as it works. That flexibility is useful, but it also makes it harder to know exactly what was approved, what changed, and whether a later retry quietly widened the job. The constrained route adds explicit checkpoints around that flexibility.&lt;/p&gt;

    &lt;div class=&quot;two-col&quot;&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;
        &lt;h3&gt;The problem it reduces&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;Accidental expansion beyond the selected phase.&lt;/li&gt;
          &lt;li&gt;Important side effects being missed.&lt;/li&gt;
          &lt;li&gt;Execution using a plan or repository state that changed after review.&lt;/li&gt;
          &lt;li&gt;A model treating source text, logs, or comments as instructions.&lt;/li&gt;
          &lt;li&gt;“Done” being declared without evidence from the actual result.&lt;/li&gt;
          &lt;li&gt;Failures and retries disappearing from the record.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;
        &lt;h3&gt;What it deliberately does not promise&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;It is not an operating-system sandbox.&lt;/li&gt;
          &lt;li&gt;It does not defend against a malicious actor with equivalent filesystem authority.&lt;/li&gt;
          &lt;li&gt;It cannot provide a complete trace of every child-agent action on the current host.&lt;/li&gt;
          &lt;li&gt;It cannot turn a local hash into proof of identity, authorization, or tamper resistance.&lt;/li&gt;
          &lt;li&gt;It does not make unsupported shell commands or test runners safe by describing them in prose.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card callout safe&quot;&gt;
      &lt;p&gt;&lt;strong&gt;The central idea:&lt;/strong&gt; preserve the model’s ability to solve a bounded coding problem, but put deterministic gates around the scope, permissions, evidence, state, and durable records.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;routes&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;2 · Route choice&lt;/div&gt;
    &lt;h2&gt;The user chooses standard, constrained, or undecided&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;Creating an implementation plan does not automatically place the work in the constrained pipeline. The route is a user decision, recorded in the plan.&lt;/p&gt;

    &lt;div class=&quot;diagram-wrap&quot;&gt;
      &lt;svg class=&quot;diagram&quot; viewBox=&quot;0 0 700 270&quot; role=&quot;img&quot; aria-labelledby=&quot;route-title route-desc&quot;&gt;
        &lt;title id=&quot;route-title&quot;&gt;Route choice after an implementation plan&lt;/title&gt;
        &lt;desc id=&quot;route-desc&quot;&gt;The implementation plan branches to standard execution, constrained execution one phase at a time, or an undecided stop.&lt;/desc&gt;
        &lt;defs&gt;
          &lt;marker id=&quot;route-arrow&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;6&quot; markerHeight=&quot;6&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;currentColor&quot;&gt;&lt;/path&gt;&lt;/marker&gt;
        &lt;/defs&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;235&quot; y=&quot;12&quot; width=&quot;230&quot; height=&quot;58&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;350&quot; y=&quot;36&quot;&gt;Implementation plan created&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;54&quot;&gt;Route field must be explicit&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M350 70 V106 M350 106 H119 V128 M350 106 V128 M350 106 H581 V128&quot; marker-end=&quot;url(#route-arrow)&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-safe&quot; x=&quot;20&quot; y=&quot;130&quot; width=&quot;198&quot; height=&quot;88&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;119&quot; y=&quot;154&quot;&gt;standard&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;119&quot; y=&quot;174&quot;&gt;rb-execute-plan coordinates&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;119&quot; y=&quot;191&quot;&gt;ordinary implementation skills&lt;/text&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;251&quot; y=&quot;130&quot; width=&quot;198&quot; height=&quot;88&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;350&quot; y=&quot;154&quot;&gt;constrained&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;174&quot;&gt;compile → assess → execute&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;191&quot;&gt;one phase at a time&lt;/text&gt;
        &lt;rect class=&quot;node node-caution&quot; x=&quot;482&quot; y=&quot;130&quot; width=&quot;198&quot; height=&quot;88&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;581&quot; y=&quot;154&quot;&gt;undecided&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;581&quot; y=&quot;174&quot;&gt;do not enter constrained&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;581&quot; y=&quot;191&quot;&gt;pipeline yet&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;249&quot;&gt;Security-related subject matter alone never selects the constrained route.&lt;/text&gt;
      &lt;/svg&gt;
      &lt;p class=&quot;caption&quot;&gt;The constrained route is optional. It is a different way of carrying out an existing plan, not a replacement for planning.&lt;/p&gt;
    &lt;/div&gt;

    &lt;div class=&quot;table-responsive&quot;&gt;
      &lt;table class=&quot;table table-sm&quot;&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Choose&lt;/th&gt;&lt;th&gt;When it fits&lt;/th&gt;&lt;th&gt;Important trade-off&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;standard&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Normal development where the usual tests, review, and human oversight are enough.&lt;/td&gt;&lt;td&gt;More flexible and usually faster; it does not use the assessed low-level-plan envelope.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;constrained&lt;/code&gt;&lt;/td&gt;&lt;td&gt;A phase needs stronger scope control, explicit side-effect review, immutable handoffs, and durable evidence.&lt;/td&gt;&lt;td&gt;More ceremony; current supported operations are intentionally narrow.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;undecided&lt;/code&gt;&lt;/td&gt;&lt;td&gt;The user wants the plan but is not ready to choose the execution route.&lt;/td&gt;&lt;td&gt;Execution waits; the system must not infer a route.&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;current-flow&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;3 · Current system&lt;/div&gt;
    &lt;h2&gt;The complete constrained flow&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;Only one current phase is compiled. Later phases remain visible in the original plan and in the working-diary handoff, but they are not compiled early against stale state.&lt;/p&gt;

    &lt;div class=&quot;diagram-wrap&quot;&gt;
      &lt;svg class=&quot;diagram&quot; viewBox=&quot;0 0 700 535&quot; role=&quot;img&quot; aria-labelledby=&quot;flow-title flow-desc&quot;&gt;
        &lt;title id=&quot;flow-title&quot;&gt;Current constrained process from phase selection to verification&lt;/title&gt;
        &lt;desc id=&quot;flow-desc&quot;&gt;The coordinator selects one phase, creates a low-level plan, assesses it, stops on false, executes safe true, verifies, repairs if in scope, and records the handoff.&lt;/desc&gt;
        &lt;defs&gt;
          &lt;marker id=&quot;flow-arrow&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;6&quot; markerHeight=&quot;6&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;currentColor&quot;&gt;&lt;/path&gt;&lt;/marker&gt;
        &lt;/defs&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;210&quot; y=&quot;10&quot; width=&quot;280&quot; height=&quot;52&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;350&quot; y=&quot;32&quot;&gt;rb-execute-plan selects one phase&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;49&quot;&gt;Original plan stays authoritative&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M350 62 V88&quot; marker-end=&quot;url(#flow-arrow)&quot;&gt;&lt;/path&gt;

        &lt;rect class=&quot;node node-agent&quot; x=&quot;210&quot; y=&quot;90&quot; width=&quot;280&quot; height=&quot;66&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;350&quot; y=&quot;114&quot;&gt;rb-create-low-level-plan&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;133&quot;&gt;Snapshot + typed operations + effects&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;147&quot;&gt;Canonical JSON and plan hash&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M350 156 V182&quot; marker-end=&quot;url(#flow-arrow)&quot;&gt;&lt;/path&gt;

        &lt;rect class=&quot;node node-control&quot; x=&quot;210&quot; y=&quot;184&quot; width=&quot;280&quot; height=&quot;66&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;350&quot; y=&quot;208&quot;&gt;rb-assess-plan-safety&lt;/text&gt;

        &lt;text class=&quot;small&quot; x=&quot;567&quot; y=&quot;207&quot;&gt;TRUE&lt;/text&gt;

        &lt;rect class=&quot;node node-caution&quot; x=&quot;18&quot; y=&quot;284&quot; width=&quot;188&quot; height=&quot;84&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;112&quot; y=&quot;309&quot;&gt;Stop for a human&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;112&quot; y=&quot;328&quot;&gt;Revise and reassess, leave&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;112&quot; y=&quot;342&quot;&gt;the pipeline, or abandon&lt;/text&gt;

        &lt;text class=&quot;small&quot; x=&quot;588&quot; y=&quot;342&quot;&gt;execute exact envelope&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;588&quot; y=&quot;356&quot;&gt;and append audit events&lt;/text&gt;

        &lt;text class=&quot;small&quot; x=&quot;353&quot; y=&quot;426&quot;&gt;Verifier report + coordinator&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;353&quot; y=&quot;440&quot;&gt;product-state evidence&lt;/text&gt;

        &lt;path class=&quot;edge&quot; d=&quot;M258 418 H201 V470 H275&quot; marker-end=&quot;url(#flow-arrow)&quot;&gt;&lt;/path&gt;
        &lt;text class=&quot;small&quot; x=&quot;218&quot; y=&quot;407&quot;&gt;in-envelope finding&lt;/text&gt;
        &lt;rect class=&quot;node node-caution&quot; x=&quot;275&quot; y=&quot;468&quot; width=&quot;156&quot; height=&quot;42&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;353&quot; y=&quot;493&quot;&gt;Repair, then verify again&lt;/text&gt;

        &lt;text class=&quot;small&quot; x=&quot;548&quot; y=&quot;407&quot;&gt;criteria met&lt;/text&gt;
        &lt;rect class=&quot;node node-safe&quot; x=&quot;535&quot; y=&quot;468&quot; width=&quot;110&quot; height=&quot;42&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;590&quot; y=&quot;493&quot;&gt;verified&lt;/text&gt;
      &lt;/svg&gt;
    &lt;/div&gt;

    &lt;div class=&quot;steps&quot;&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;div&gt;&lt;h3&gt;Select one phase&lt;/h3&gt;&lt;p&gt;&lt;code&gt;$rb-execute-plan&lt;/code&gt; checks that the plan says &lt;code&gt;constrained&lt;/code&gt;, chooses the one current phase, preserves later phase IDs, and delegates compilation.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;div&gt;&lt;h3&gt;Compile the phase&lt;/h3&gt;&lt;p&gt;&lt;code&gt;$rb-create-low-level-plan&lt;/code&gt; converts prose into strict operations, path permissions, effects, evidence requirements, stop conditions, resource declarations, and verifier checks.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;div&gt;&lt;h3&gt;Assess the exact artifact&lt;/h3&gt;&lt;p&gt;&lt;code&gt;$rb-assess-plan-safety&lt;/code&gt; first runs deterministic checks. Only a passing preflight reaches the fresh semantic assessor.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;div&gt;&lt;h3&gt;Stop on false; execute only true&lt;/h3&gt;&lt;p&gt;A rejected bundle is immutable. A passing bundle authorizes only its exact plan, policy, snapshot, capability, and approval identities.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;div&gt;&lt;h3&gt;Revalidate immediately before use&lt;/h3&gt;&lt;p&gt;&lt;code&gt;$rb-safe-operation&lt;/code&gt; recomputes the plan hash and checks policy, assessment, runtime, instructions, paths, approvals, lease, and repository state before any operation.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;div&gt;&lt;h3&gt;Execute, observe, and record&lt;/h3&gt;&lt;p&gt;The coordinator holds the project lease, dispatches only approved adapters, compares agent reports with observed product state, and writes the control-plane event chain.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;div&gt;&lt;h3&gt;Verify in a separated context&lt;/h3&gt;&lt;p&gt;The verifier receives the contract and current evidence without executor private reasoning. Both verifier evidence and coordinator-observed state are required for &lt;code&gt;verified&lt;/code&gt;.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;step&quot;&gt;&lt;div&gt;&lt;h3&gt;Checkpoint and stop&lt;/h3&gt;&lt;p&gt;The run records its terminal state and exact next action in the external working diary. It does not silently begin the next phase.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;skills&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;4 · Skill responsibilities&lt;/div&gt;
    &lt;h2&gt;What each tool does—and does not do&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;The skills form a chain of narrow responsibilities. Keeping those jobs separate is part of the safety design.&lt;/p&gt;

    &lt;div class=&quot;table-responsive&quot;&gt;
      &lt;table class=&quot;table&quot;&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Skill&lt;/th&gt;&lt;th&gt;Its job&lt;/th&gt;&lt;th&gt;What it must not do&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;$rb-create-implementation-plan&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Creates the top-level phased plan and presents the route choice.&lt;/td&gt;&lt;td&gt;Does not silently select the constrained route or execute the work.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;$rb-execute-plan&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Coordinates the overall plan, chooses one current phase, and routes each phase to the right execution process.&lt;/td&gt;&lt;td&gt;Does not replace the low-level compiler, safety assessor, or operation coordinator.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;$rb-create-low-level-plan&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Compiles exactly one phase into a canonical typed proposal and fixed handoff.&lt;/td&gt;&lt;td&gt;Does not assess, execute, or compile later phases in advance.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;$rb-assess-plan-safety&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Runs deterministic and semantic assessment, producing immutable &lt;code&gt;safe: true&lt;/code&gt; or &lt;code&gt;safe: false&lt;/code&gt;.&lt;/td&gt;&lt;td&gt;Does not modify the product, trust planner reasoning, or turn uncertainty into approval.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;$rb-safe-operation&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Revalidates, leases, executes, audits, repairs within scope, verifies, and emits the durable handoff.&lt;/td&gt;&lt;td&gt;Does not widen the envelope, downgrade assurance, install dependencies during normal operation, or start the next phase.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;$rb-working-diary&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Preserves the current phase, remaining phases, hashes, state, limitations, and exact next action across sessions.&lt;/td&gt;&lt;td&gt;Does not authorize execution; every resume must revalidate the real bundle and repository state.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;$rb-implement-with-tests&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Implements one ordinary task under the standard route when normal command/test execution is available.&lt;/td&gt;&lt;td&gt;It is not the constrained operation executor and does not own multi-phase plan state.&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card callout caution&quot;&gt;
      &lt;p&gt;&lt;strong&gt;Important current limitation:&lt;/strong&gt; the constrained first release activates only &lt;code&gt;read_file&lt;/code&gt;, &lt;code&gt;apply_patch&lt;/code&gt;, and bounded agent tasks limited to reading and patching. Typed &lt;code&gt;exec_argv&lt;/code&gt; and &lt;code&gt;check&lt;/code&gt; forms exist, but policy disables them until stronger containment has been reviewed. A bounded task cannot smuggle in a shell, test runner, subprocess, network call, or delegation.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;contract&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;5 · Typed contract&lt;/div&gt;
    &lt;h2&gt;What a low-level plan actually contains&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;The low-level plan is not a long prompt saying “be careful.” It is a closed, versioned data structure. Unknown fields are rejected.&lt;/p&gt;

    &lt;div class=&quot;diagram-wrap&quot;&gt;
      &lt;svg class=&quot;diagram&quot; viewBox=&quot;0 0 700 380&quot; role=&quot;img&quot; aria-labelledby=&quot;envelope-title envelope-desc&quot;&gt;
        &lt;title id=&quot;envelope-title&quot;&gt;Contents of the low-level operation envelope&lt;/title&gt;
        &lt;desc id=&quot;envelope-desc&quot;&gt;An approved operation is surrounded by scope, path, capability, effect, evidence, approval, resource, and verification boundaries.&lt;/desc&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;215&quot; y=&quot;140&quot; width=&quot;270&quot; height=&quot;100&quot; rx=&quot;16&quot;&gt;&lt;/rect&gt;

        &lt;text x=&quot;350&quot; y=&quot;190&quot;&gt;exact action&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;207&quot;&gt;or bounded agent task&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;224&quot;&gt;stable ID + dependencies&lt;/text&gt;

        &lt;rect class=&quot;node&quot; x=&quot;28&quot; y=&quot;18&quot; width=&quot;190&quot; height=&quot;68&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;123&quot; y=&quot;43&quot;&gt;Goal and non-goals&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;123&quot; y=&quot;62&quot;&gt;What success means&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M180 86 L265 140&quot;&gt;&lt;/path&gt;

        &lt;rect class=&quot;node&quot; x=&quot;255&quot; y=&quot;18&quot; width=&quot;190&quot; height=&quot;68&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;350&quot; y=&quot;43&quot;&gt;Path contract&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;62&quot;&gt;Read/create/modify/delete&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M350 86 V140&quot;&gt;&lt;/path&gt;

        &lt;rect class=&quot;node&quot; x=&quot;482&quot; y=&quot;18&quot; width=&quot;190&quot; height=&quot;68&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;

        &lt;text class=&quot;small&quot; x=&quot;577&quot; y=&quot;62&quot;&gt;Tools, environment, network&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M520 86 L435 140&quot;&gt;&lt;/path&gt;

        &lt;rect class=&quot;node&quot; x=&quot;28&quot; y=&quot;294&quot; width=&quot;190&quot; height=&quot;68&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;123&quot; y=&quot;319&quot;&gt;Effects and recovery&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;123&quot; y=&quot;338&quot;&gt;Direct, indirect, cumulative&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M180 294 L265 240&quot;&gt;&lt;/path&gt;

        &lt;rect class=&quot;node&quot; x=&quot;255&quot; y=&quot;294&quot; width=&quot;190&quot; height=&quot;68&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;350&quot; y=&quot;319&quot;&gt;Evidence and approvals&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;338&quot;&gt;Provenance + exact gates&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M350 294 V240&quot;&gt;&lt;/path&gt;

        &lt;rect class=&quot;node&quot; x=&quot;482&quot; y=&quot;294&quot; width=&quot;190&quot; height=&quot;68&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;577&quot; y=&quot;319&quot;&gt;Limits and verification&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;577&quot; y=&quot;338&quot;&gt;Stops, checks, ceilings&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M520 294 L435 240&quot;&gt;&lt;/path&gt;
      &lt;/svg&gt;
    &lt;/div&gt;

    &lt;div class=&quot;three-col&quot;&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;&lt;h3&gt;Exact action&lt;/h3&gt;&lt;p&gt;A known adapter with exact targets and inputs. Today the active examples are bounded file reading and patch application.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;&lt;h3&gt;Bounded agent task&lt;/h3&gt;&lt;p&gt;A semantic coding task with a goal and limited room to adapt, but no authority to add a path, tool, permission, objective, effect class, or external target.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;&lt;h3&gt;Blocking diagnostic&lt;/h3&gt;&lt;p&gt;If the prose is ambiguous, the effect cannot be bounded, or the required operation is unsupported, compilation stops instead of inventing a workaround.&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;h3&gt;Every material effect is described&lt;/h3&gt;
    &lt;p class=&quot;lead&quot;&gt;Effects include more than the intended file change. The contract records affected parties, data sensitivity, security relevance, severity, likelihood, exposure, reversibility, detectability, mitigation, recovery, cost, availability, targets, observation sources, and evidence.&lt;/p&gt;
  &lt;/section&gt;

  &lt;section id=&quot;assessment&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;6 · Assessment&lt;/div&gt;
    &lt;h2&gt;Safety is both deterministic and semantic&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;Some questions have exact answers; others require judgment. The process uses each kind of reasoning where it belongs.&lt;/p&gt;

    &lt;div class=&quot;two-col&quot;&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;
        &lt;h3&gt;Deterministic gate&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;Strict schema and version validation.&lt;/li&gt;
          &lt;li&gt;Canonical bytes and typed hashes.&lt;/li&gt;
          &lt;li&gt;Plan, source phase, policy, and snapshot identity.&lt;/li&gt;
          &lt;li&gt;Path containment and protected roots.&lt;/li&gt;
          &lt;li&gt;Operation dependency graph.&lt;/li&gt;
          &lt;li&gt;Allowed tools, transitive capabilities, environment, and network.&lt;/li&gt;
          &lt;li&gt;Required approvals and host capabilities.&lt;/li&gt;
          &lt;li&gt;Evidence coverage and verifier checks.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;
        &lt;h3&gt;Fresh semantic assessment&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;Does the contract faithfully implement the phase?&lt;/li&gt;
          &lt;li&gt;Is hidden or accidental scope missing?&lt;/li&gt;
          &lt;li&gt;Could tools or dependencies cause undeclared behavior?&lt;/li&gt;
          &lt;li&gt;Are there detrimental side effects—direct, indirect, cumulative, or caused by verification?&lt;/li&gt;
          &lt;li&gt;Is recovery realistic?&lt;/li&gt;
          &lt;li&gt;Does evidence contain prompt injection?&lt;/li&gt;
          &lt;li&gt;Is any material uncertainty still unresolved?&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;diagram-wrap&quot;&gt;
      &lt;svg class=&quot;diagram&quot; viewBox=&quot;0 0 700 240&quot; role=&quot;img&quot; aria-labelledby=&quot;assessment-title assessment-desc&quot;&gt;
        &lt;title id=&quot;assessment-title&quot;&gt;Safety verdict logic&lt;/title&gt;
        &lt;desc id=&quot;assessment-desc&quot;&gt;A deterministic failure becomes safe false without a semantic call. A deterministic pass goes to semantic assessment, which must also pass for safe true.&lt;/desc&gt;
        &lt;defs&gt;&lt;marker id=&quot;assessment-arrow&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;6&quot; markerHeight=&quot;6&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;currentColor&quot;&gt;&lt;/path&gt;&lt;/marker&gt;&lt;/defs&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;18&quot; y=&quot;76&quot; width=&quot;180&quot; height=&quot;72&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;108&quot; y=&quot;101&quot;&gt;Deterministic preflight&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;108&quot; y=&quot;121&quot;&gt;Exact checks first&lt;/text&gt;
        &lt;path class=&quot;edge edge-caution&quot; d=&quot;M108 148 V192 H250&quot; marker-end=&quot;url(#assessment-arrow)&quot;&gt;&lt;/path&gt;
        &lt;text class=&quot;small&quot; x=&quot;150&quot; y=&quot;183&quot;&gt;any failure&lt;/text&gt;
        &lt;path class=&quot;edge edge-safe&quot; d=&quot;M198 112 H270&quot; marker-end=&quot;url(#assessment-arrow)&quot;&gt;&lt;/path&gt;
        &lt;text class=&quot;small&quot; x=&quot;234&quot; y=&quot;101&quot;&gt;pass&lt;/text&gt;
        &lt;rect class=&quot;node node-agent&quot; x=&quot;272&quot; y=&quot;76&quot; width=&quot;180&quot; height=&quot;72&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;362&quot; y=&quot;101&quot;&gt;Semantic assessor&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;362&quot; y=&quot;121&quot;&gt;Fresh bounded context&lt;/text&gt;
        &lt;path class=&quot;edge edge-caution&quot; d=&quot;M362 148 V192 H250&quot; marker-end=&quot;url(#assessment-arrow)&quot;&gt;&lt;/path&gt;

    &lt;/div&gt;

    &lt;div class=&quot;card callout caution&quot;&gt;
      &lt;p&gt;&lt;strong&gt;FALSE triggers human intervention.&lt;/strong&gt; Findings name the violated invariant, affected operations/effects, evidence, severity, and required remediation or decision. A human can revise and reassess, leave the constrained pipeline, approve an already declared exact gate through the bounded procedure, or abandon. None of those choices changes the old false artifact into true.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;identity&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;7 · Identity&lt;/div&gt;
    &lt;h2&gt;Hashes answer “is this the same artifact?”&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;The system repeatedly checks that the thing being used is the thing that was assessed. This includes the complete low-level plan at the moment of execution—not just the policy.&lt;/p&gt;

    &lt;div class=&quot;diagram-wrap&quot;&gt;
      &lt;svg class=&quot;diagram&quot; viewBox=&quot;0 0 700 345&quot; role=&quot;img&quot; aria-labelledby=&quot;hash-title hash-desc&quot;&gt;

        &lt;rect class=&quot;node&quot; x=&quot;16&quot; y=&quot;106&quot; width=&quot;150&quot; height=&quot;56&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;91&quot; y=&quot;130&quot;&gt;Repository snapshot&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;91&quot; y=&quot;148&quot;&gt;state + instructions&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M166 48 H194 V84 H222&quot; marker-end=&quot;url(#hash-arrow)&quot;&gt;&lt;/path&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M166 134 H194 V116 H222&quot; marker-end=&quot;url(#hash-arrow)&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;224&quot; y=&quot;54&quot; width=&quot;190&quot; height=&quot;92&quot; rx=&quot;14&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;319&quot; y=&quot;80&quot;&gt;Canonical low-level plan&lt;/text&gt;&lt;text x=&quot;319&quot; y=&quot;102&quot;&gt;plan_hash&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;319&quot; y=&quot;121&quot;&gt;complete typed payload&lt;/text&gt;

        &lt;rect class=&quot;node&quot; x=&quot;224&quot; y=&quot;214&quot; width=&quot;190&quot; height=&quot;58&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;319&quot; y=&quot;238&quot;&gt;Host capabilities&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;319&quot; y=&quot;257&quot;&gt;observed profile + hash&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M198 243 H438 V142 H470&quot; marker-end=&quot;url(#hash-arrow)&quot;&gt;&lt;/path&gt;

    &lt;div class=&quot;card callout&quot;&gt;
      &lt;p&gt;&lt;strong&gt;A hash is an identity check, not a safety certificate.&lt;/strong&gt; It can show that bytes match an expected value when the expected value and hashing process are trusted. It does not itself grant permission, prove who acted, prevent an operation, or make local files tamper-proof.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;execution&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;8 · Execution and audit&lt;/div&gt;
    &lt;h2&gt;The coordinator is the control-plane owner&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;Agents propose. The deterministic coordinator decides whether a proposal is valid and owns durable run state. Under the workflow contract, the current leased executor is the only role permitted to make approved product changes; the current host does not turn that role rule into a separate operating-system identity.&lt;/p&gt;

    &lt;div class=&quot;diagram-wrap&quot;&gt;
      &lt;svg class=&quot;diagram&quot; viewBox=&quot;0 0 700 390&quot; role=&quot;img&quot; aria-labelledby=&quot;planes-title planes-desc&quot;&gt;
        &lt;title id=&quot;planes-title&quot;&gt;Product plane and control plane&lt;/title&gt;
        &lt;desc id=&quot;planes-desc&quot;&gt;The coordinator owns canonical plans, assessments, lease, lifecycle, audit, and verification. The executor alone performs approved product changes. Planner, assessor, and verifier submit proposals.&lt;/desc&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;20&quot; y=&quot;28&quot; width=&quot;660&quot; height=&quot;152&quot; rx=&quot;16&quot;&gt;&lt;/rect&gt;
        &lt;text class=&quot;label&quot; x=&quot;350&quot; y=&quot;51&quot;&gt;Control plane · coordinator is the sole durable writer&lt;/text&gt;
        &lt;rect class=&quot;node&quot; x=&quot;44&quot; y=&quot;70&quot; width=&quot;132&quot; height=&quot;72&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;110&quot; y=&quot;95&quot;&gt;Plan + policy&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;110&quot; y=&quot;115&quot;&gt;canonical artifacts&lt;/text&gt;
        &lt;rect class=&quot;node&quot; x=&quot;204&quot; y=&quot;70&quot; width=&quot;132&quot; height=&quot;72&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;270&quot; y=&quot;95&quot;&gt;Assessment&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;270&quot; y=&quot;115&quot;&gt;true/false + findings&lt;/text&gt;
        &lt;rect class=&quot;node&quot; x=&quot;364&quot; y=&quot;70&quot; width=&quot;132&quot; height=&quot;72&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;430&quot; y=&quot;95&quot;&gt;Lease + lifecycle&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;430&quot; y=&quot;115&quot;&gt;one run mutates&lt;/text&gt;
        &lt;rect class=&quot;node&quot; x=&quot;524&quot; y=&quot;70&quot; width=&quot;132&quot; height=&quot;72&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;590&quot; y=&quot;95&quot;&gt;Audit + verify&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;590&quot; y=&quot;115&quot;&gt;event chain&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M350 180 V220&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-safe&quot; x=&quot;20&quot; y=&quot;222&quot; width=&quot;660&quot; height=&quot;142&quot; rx=&quot;16&quot;&gt;&lt;/rect&gt;

        &lt;rect class=&quot;node node-agent&quot; x=&quot;72&quot; y=&quot;270&quot; width=&quot;164&quot; height=&quot;64&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;154&quot; y=&quot;295&quot;&gt;Leased executor&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;154&quot; y=&quot;315&quot;&gt;approved workflow envelope&lt;/text&gt;
        &lt;path class=&quot;edge edge-safe&quot; d=&quot;M236 302 H294&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node&quot; x=&quot;296&quot; y=&quot;270&quot; width=&quot;164&quot; height=&quot;64&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;378&quot; y=&quot;295&quot;&gt;Product files&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;378&quot; y=&quot;315&quot;&gt;declared paths/effects&lt;/text&gt;
        &lt;path class=&quot;edge&quot; d=&quot;M460 302 H516&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-agent&quot; x=&quot;518&quot; y=&quot;270&quot; width=&quot;110&quot; height=&quot;64&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;573&quot; y=&quot;295&quot;&gt;Verifier&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;573&quot; y=&quot;315&quot;&gt;reports only&lt;/text&gt;
        &lt;text class=&quot;small&quot; x=&quot;350&quot; y=&quot;382&quot;&gt;Planner, assessor, executor, and verifier responses are evidence proposals—not durable authority.&lt;/text&gt;

    &lt;/div&gt;

    &lt;h3&gt;Preflight immediately before mutation&lt;/h3&gt;
    &lt;ul class=&quot;plain-list&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span&gt;Revalidate runtime, schema, source tree, lockfile, installed package, launcher, and manifest identities.&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span&gt;Recompute plan, assessment, policy, snapshot, approval, and instruction identities.&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span&gt;Acquire the one project mutation lease at &lt;code&gt;.rb-safe-operation/execution.lease&lt;/code&gt;; never steal a live, stale, or uncertain lease.&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span&gt;Repeat path containment, symlink/inode/device, preimage, approval, and concurrent-change checks immediately before every mutation.&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span&gt;Stop rather than overwrite unexpected user work or accept new scope.&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;

    &lt;h3&gt;Durable records&lt;/h3&gt;
    &lt;p class=&quot;lead&quot;&gt;Each run stores its control state under &lt;code&gt;.rb-safe-operation/runs/&amp;lt;run-id&amp;gt;/&lt;/code&gt;. Events are canonical, typed, redacted, numbered, and hash-chained. This makes accidental corruption and broken continuity visible. “Append-only” describes the workflow contract; project-local storage is not malicious-tamper-proof.&lt;/p&gt;

    &lt;div class=&quot;inline-list&quot; aria-label=&quot;Audit event chain&quot;&gt;
      &lt;code&gt;event 000&lt;/code&gt;&lt;span aria-hidden=&quot;true&quot;&gt;→&lt;/span&gt;&lt;code&gt;event 001&lt;/code&gt;&lt;span aria-hidden=&quot;true&quot;&gt;→&lt;/span&gt;&lt;code&gt;event 002&lt;/code&gt;&lt;span aria-hidden=&quot;true&quot;&gt;→&lt;/span&gt;&lt;code&gt;event head hash&lt;/code&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;repair&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;9 · Repair and durability&lt;/div&gt;
    &lt;h2&gt;Repair can adapt, but only inside the approved envelope&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;The system avoids an unnecessarily small numeric retry cap for reversible local debugging. “Unbounded” does not mean uncontrolled.&lt;/p&gt;

    &lt;div class=&quot;two-col&quot;&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;
        &lt;h3&gt;&lt;code&gt;attempt_limit: &quot;unbounded&quot;&lt;/code&gt; means&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;No workflow-level numeric ceiling on eligible reversible local repair attempts.&lt;/li&gt;
          &lt;li&gt;Each attempt remains inside the same goal, paths, tools, permissions, and effect ceiling.&lt;/li&gt;
          &lt;li&gt;Repeated wording alone does not trigger a fixed stop.&lt;/li&gt;
          &lt;li&gt;The record captures the hypothesis, observed result, reconsidered assumption, and next strategy.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;
        &lt;h3&gt;It does not mean&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;Infinite time, cost, context, bytes, or host resources.&lt;/li&gt;
          &lt;li&gt;Permission to replay destructive or external actions freely.&lt;/li&gt;
          &lt;li&gt;Permission to add a new tool, root, target, objective, or effect.&lt;/li&gt;
          &lt;li&gt;Permission to ignore a host pause, new uncertainty, or changed repository state.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;diagram-wrap&quot;&gt;

        &lt;rect class=&quot;node node-control&quot; x=&quot;462&quot; y=&quot;82&quot; width=&quot;112&quot; height=&quot;44&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;518&quot; y=&quot;109&quot;&gt;executing&lt;/text&gt;

        &lt;rect class=&quot;node node-caution&quot; x=&quot;314&quot; y=&quot;178&quot; width=&quot;112&quot; height=&quot;44&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;370&quot; y=&quot;205&quot;&gt;repairing&lt;/text&gt;

        &lt;rect class=&quot;node node-caution&quot; x=&quot;272&quot; y=&quot;284&quot; width=&quot;136&quot; height=&quot;44&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;340&quot; y=&quot;311&quot;&gt;human_required&lt;/text&gt;
        &lt;rect class=&quot;node&quot; x=&quot;472&quot; y=&quot;284&quot; width=&quot;92&quot; height=&quot;44&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;518&quot; y=&quot;311&quot;&gt;failed&lt;/text&gt;
        &lt;rect class=&quot;node&quot; x=&quot;594&quot; y=&quot;284&quot; width=&quot;92&quot; height=&quot;44&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text x=&quot;640&quot; y=&quot;311&quot;&gt;abandoned&lt;/text&gt;
