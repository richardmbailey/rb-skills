  &lt;/section&gt;

  &lt;section id=&quot;verification&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;10 · Verification&lt;/div&gt;
    &lt;h2&gt;“The executor says it worked” is not enough&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;A successful terminal state requires two distinct kinds of evidence: what the coordinator can observe in the product state, and what the separated verifier reports against the contract.&lt;/p&gt;

    &lt;div class=&quot;three-col&quot;&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;&lt;h3&gt;Coordinator evidence&lt;/h3&gt;&lt;p&gt;Snapshot and diff observations tied to the exact repository and run. This is &lt;code&gt;coordinator_observed&lt;/code&gt;, not a complete host trace.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;&lt;h3&gt;Verifier evidence&lt;/h3&gt;&lt;p&gt;A typed proposal from a fresh requested context covering every success criterion, verifier check, observed effect, and finding.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;&lt;h3&gt;Final rule&lt;/h3&gt;&lt;p&gt;&lt;code&gt;verified&lt;/code&gt; requires both sources, no blocking finding, no undeclared material effect, and matching plan/assessment/snapshot identities.&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card callout caution&quot;&gt;
      &lt;p&gt;The current host does not prove that the verifier has a separate operating-system identity or a complete absence of write tools. Freshness and read-only behavior are requested and recorded as &lt;code&gt;instruction_only&lt;/code&gt;; therefore &lt;code&gt;independent_context&lt;/code&gt; remains false unless a future host can attest stronger separation.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;assurance&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;11 · Assurance language&lt;/div&gt;
    &lt;h2&gt;The labels describe different properties&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;The process avoids collapsing identity, permission, prevention, observation, and tamper resistance into a vague word such as “secure.”&lt;/p&gt;

    &lt;div class=&quot;diagram-wrap&quot;&gt;
      &lt;svg class=&quot;diagram&quot; viewBox=&quot;0 0 700 300&quot; role=&quot;img&quot; aria-labelledby=&quot;assurance-title assurance-desc&quot;&gt;
        &lt;title id=&quot;assurance-title&quot;&gt;Assurance properties and current evidence levels&lt;/title&gt;
        &lt;desc id=&quot;assurance-desc&quot;&gt;Identity uses canonical hashes. Authorization uses policy and approvals. Role isolation is instruction-only. Product observation is coordinator observed. Complete host trace and malicious tamper resistance are not provided.&lt;/desc&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;24&quot; y=&quot;20&quot; width=&quot;652&quot; height=&quot;42&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;138&quot; y=&quot;46&quot;&gt;Identity&lt;/text&gt;&lt;text x=&quot;428&quot; y=&quot;46&quot;&gt;canonical bytes + typed hashes&lt;/text&gt;
        &lt;rect class=&quot;node node-safe&quot; x=&quot;24&quot; y=&quot;76&quot; width=&quot;652&quot; height=&quot;42&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;138&quot; y=&quot;102&quot;&gt;Authorization&lt;/text&gt;&lt;text x=&quot;428&quot; y=&quot;102&quot;&gt;global/project policy + exact gates&lt;/text&gt;
        &lt;rect class=&quot;node node-caution&quot; x=&quot;24&quot; y=&quot;132&quot; width=&quot;652&quot; height=&quot;42&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;138&quot; y=&quot;158&quot;&gt;Role isolation&lt;/text&gt;&lt;text x=&quot;428&quot; y=&quot;158&quot;&gt;instruction-only on current host&lt;/text&gt;
        &lt;rect class=&quot;node node-agent&quot; x=&quot;24&quot; y=&quot;188&quot; width=&quot;652&quot; height=&quot;42&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;138&quot; y=&quot;214&quot;&gt;Product observation&lt;/text&gt;&lt;text x=&quot;428&quot; y=&quot;214&quot;&gt;coordinator-observed state&lt;/text&gt;
        &lt;rect class=&quot;node&quot; x=&quot;24&quot; y=&quot;244&quot; width=&quot;652&quot; height=&quot;42&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;138&quot; y=&quot;270&quot;&gt;Not claimed&lt;/text&gt;&lt;text x=&quot;428&quot; y=&quot;270&quot;&gt;complete host trace or malicious-tamper proof&lt;/text&gt;
      &lt;/svg&gt;
    &lt;/div&gt;

    &lt;div class=&quot;table-responsive&quot;&gt;
      &lt;table class=&quot;table table-sm&quot;&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Label&lt;/th&gt;&lt;th&gt;Plain-language meaning&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;instruction_only&lt;/code&gt;&lt;/td&gt;&lt;td&gt;The role is told to follow a restriction, but the current host does not technically remove every conflicting capability.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;agent_reported&lt;/code&gt;&lt;/td&gt;&lt;td&gt;An agent says something happened. The claim is evidence, not a complete trace.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;coordinator_observed&lt;/code&gt;&lt;/td&gt;&lt;td&gt;The deterministic coordinator measured a state or comparison it owns.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;host_observed&lt;/code&gt;&lt;/td&gt;&lt;td&gt;The host independently observed an event. First-release low-level plans may not invent this provenance.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;host_enforced&lt;/code&gt;&lt;/td&gt;&lt;td&gt;The host technically prevents a capability or action. The current semi-formal profile does not claim this for assessor/verifier role isolation.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;unknown&lt;/code&gt;&lt;/td&gt;&lt;td&gt;The property has not been established. Required unknowns fail closed.&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;

    &lt;h3&gt;Why child traces are called incomplete&lt;/h3&gt;
    &lt;p class=&quot;lead&quot;&gt;The coordinator receives a child agent’s final response, but the current Codex host does not guarantee a complete parent-visible record of every child action. A product comparison may detect a lasting file change. It cannot prove that a child never briefly read a secret, made an external request, or caused a transient effect that left no visible repository change.&lt;/p&gt;
  &lt;/section&gt;

  &lt;section id=&quot;policy-today&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;12 · Policy today&lt;/div&gt;
    &lt;h2&gt;The current runtime already has a typed narrowing policy&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;The installed global policy is the immutable upper bound for a run. A current schema-1.0 &lt;code&gt;ProjectPolicy&lt;/code&gt; can narrow that baseline through a closed merge algebra when an integrator explicitly supplies it to the runtime. The user-friendly, automatically discovered repository-root policy file and natural-language authoring skill are not implemented yet.&lt;/p&gt;

    &lt;div class=&quot;two-col&quot;&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;
        &lt;h3&gt;Current global policy allows&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;code&gt;exact_action&lt;/code&gt; and &lt;code&gt;bounded_agent_task&lt;/code&gt;.&lt;/li&gt;
          &lt;li&gt;&lt;code&gt;read_file&lt;/code&gt; and &lt;code&gt;apply_patch&lt;/code&gt;.&lt;/li&gt;
          &lt;li&gt;Bounded agent tools &lt;code&gt;read&lt;/code&gt; and &lt;code&gt;apply_patch&lt;/code&gt;.&lt;/li&gt;
          &lt;li&gt;Repository-local reads, creates, modifications, deletes, and local resource effects when fully declared and otherwise permitted.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card mini-card&quot;&gt;
        &lt;h3&gt;Current global policy denies or gates&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;External writes, credential access, and irreversible effect classes.&lt;/li&gt;
          &lt;li&gt;Shells, inline interpreters, task runners, plugins, dynamic imports, and undeclared child-process potential.&lt;/li&gt;
          &lt;li&gt;Ambient environment, network grants, or executable permissions that were not explicitly provided.&lt;/li&gt;
          &lt;li&gt;Destructive, privacy-sensitive, security-sensitive, costly, external, or irreversible effects without their declared approval gates.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card callout&quot;&gt;
      &lt;p&gt;A project policy can only narrow the global baseline. It cannot activate a disabled adapter, add a network grant that the global policy lacks, increase a resource maximum, remove a required approval, or lower an enforcement requirement.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;planned-policy&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;13 · Planned extension&lt;/div&gt;
    &lt;h2&gt;Natural-language project policy and stronger tool allocation&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;&lt;span class=&quot;planned-text&quot;&gt;This section is a reviewed implementation plan, not current behavior.&lt;/span&gt; The planned extension will make project-specific restrictions easy to author while preserving deterministic authority.&lt;/p&gt;

    &lt;div class=&quot;diagram-wrap&quot;&gt;
      &lt;svg class=&quot;diagram&quot; viewBox=&quot;0 0 700 340&quot; role=&quot;img&quot; aria-labelledby=&quot;policy-title policy-desc&quot;&gt;
        &lt;title id=&quot;policy-title&quot;&gt;Planned natural-language policy authoring flow&lt;/title&gt;
        &lt;desc id=&quot;policy-desc&quot;&gt;The user states a rule. A bounded semantic translator proposes typed rules. A deterministic coordinator validates and previews. The user confirms the exact proposal. The coordinator leases, compare-and-swaps, audits, and writes the canonical root policy.&lt;/desc&gt;
        &lt;defs&gt;&lt;marker id=&quot;policy-arrow&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;8&quot; refY=&quot;5&quot; markerWidth=&quot;6&quot; markerHeight=&quot;6&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;currentColor&quot;&gt;&lt;/path&gt;&lt;/marker&gt;&lt;/defs&gt;
        &lt;rect class=&quot;node node-planned&quot; x=&quot;18&quot; y=&quot;20&quot; width=&quot;180&quot; height=&quot;64&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;108&quot; y=&quot;44&quot;&gt;User states a rule&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;108&quot; y=&quot;64&quot;&gt;“Do not read or write x.txt”&lt;/text&gt;
        &lt;path class=&quot;edge edge-planned&quot; d=&quot;M198 52 H260&quot; marker-end=&quot;url(#policy-arrow)&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-agent&quot; x=&quot;262&quot; y=&quot;20&quot; width=&quot;180&quot; height=&quot;64&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;352&quot; y=&quot;44&quot;&gt;Semantic translator&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;352&quot; y=&quot;64&quot;&gt;typed proposal only&lt;/text&gt;
        &lt;path class=&quot;edge edge-planned&quot; d=&quot;M442 52 H504&quot; marker-end=&quot;url(#policy-arrow)&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;506&quot; y=&quot;20&quot; width=&quot;176&quot; height=&quot;64&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;594&quot; y=&quot;44&quot;&gt;Deterministic validator&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;594&quot; y=&quot;64&quot;&gt;paths + merge + schema&lt;/text&gt;
        &lt;path class=&quot;edge edge-planned&quot; d=&quot;M594 84 V124&quot; marker-end=&quot;url(#policy-arrow)&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;478&quot; y=&quot;126&quot; width=&quot;232&quot; height=&quot;72&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;594&quot; y=&quot;150&quot;&gt;Preview + proposal hash&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;594&quot; y=&quot;169&quot;&gt;scope, denials, impact, limits&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;594&quot; y=&quot;185&quot;&gt;no JSON authoring required&lt;/text&gt;
        &lt;path class=&quot;edge edge-planned&quot; d=&quot;M478 162 H414&quot; marker-end=&quot;url(#policy-arrow)&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-planned&quot; x=&quot;234&quot; y=&quot;126&quot; width=&quot;180&quot; height=&quot;72&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;324&quot; y=&quot;150&quot;&gt;Human confirms&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;324&quot; y=&quot;169&quot;&gt;exact proposal + prior hash&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;324&quot; y=&quot;185&quot;&gt;relaxation warning if needed&lt;/text&gt;
        &lt;path class=&quot;edge edge-planned&quot; d=&quot;M234 162 H170&quot; marker-end=&quot;url(#policy-arrow)&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;18&quot; y=&quot;126&quot; width=&quot;152&quot; height=&quot;72&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;94&quot; y=&quot;150&quot;&gt;Policy coordinator&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;94&quot; y=&quot;169&quot;&gt;exclusive lease&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;94&quot; y=&quot;185&quot;&gt;revalidate identities&lt;/text&gt;
        &lt;path class=&quot;edge edge-planned&quot; d=&quot;M94 198 V238&quot; marker-end=&quot;url(#policy-arrow)&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-planned&quot; x=&quot;18&quot; y=&quot;240&quot; width=&quot;300&quot; height=&quot;78&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;168&quot; y=&quot;266&quot;&gt;.rb-safe-operation-policy.json&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;168&quot; y=&quot;286&quot;&gt;atomic compare-and-swap write&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;168&quot; y=&quot;302&quot;&gt;exact source hash&lt;/text&gt;
        &lt;path class=&quot;edge edge-planned&quot; d=&quot;M318 279 H382&quot; marker-end=&quot;url(#policy-arrow)&quot;&gt;&lt;/path&gt;
        &lt;rect class=&quot;node node-control&quot; x=&quot;384&quot; y=&quot;240&quot; width=&quot;298&quot; height=&quot;78&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&lt;text class=&quot;label&quot; x=&quot;533&quot; y=&quot;266&quot;&gt;Intent + committed audit events&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;533&quot; y=&quot;286&quot;&gt;global/source/effective identities&lt;/text&gt;&lt;text class=&quot;small&quot; x=&quot;533&quot; y=&quot;302&quot;&gt;old artifacts remain immutable&lt;/text&gt;
      &lt;/svg&gt;
    &lt;/div&gt;

    &lt;h3&gt;Planned path vocabulary&lt;/h3&gt;
    &lt;div class=&quot;table-responsive&quot;&gt;
      &lt;table class=&quot;table table-sm&quot;&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Rule part&lt;/th&gt;&lt;th&gt;Meaning&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;path&lt;/code&gt;&lt;/td&gt;&lt;td&gt;A canonical project-relative path. Absolute paths, &lt;code&gt;..&lt;/code&gt;, aliases, and uncertain identities fail closed.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;scope: exact&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Only the named file or directory.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;scope: subtree&lt;/code&gt;&lt;/td&gt;&lt;td&gt;The directory and every descendant, matched by path components rather than string prefixes.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;deny: read&lt;/code&gt;&lt;/td&gt;&lt;td&gt;No content read; for a denied subtree, no descendant-name enumeration. Minimal hidden metadata may be used only for containment.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;deny: create&lt;/code&gt;&lt;/td&gt;&lt;td&gt;The path cannot be created, including a future path that does not exist yet.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;deny: modify&lt;/code&gt;&lt;/td&gt;&lt;td&gt;No content, permission, ownership, extended-attribute, or link-target change.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;deny: delete&lt;/code&gt;&lt;/td&gt;&lt;td&gt;No removal or move-away. Parent operations are checked so deleting a directory cannot bypass a child denial.&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;

    &lt;h3&gt;Current versus planned&lt;/h3&gt;
    &lt;div class=&quot;table-responsive&quot;&gt;
      &lt;table class=&quot;table&quot;&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Area&lt;/th&gt;&lt;th&gt;Current release&lt;/th&gt;&lt;th&gt;Planned extension&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;Project policy input&lt;/td&gt;&lt;td class=&quot;current-cell&quot;&gt;An integrator may explicitly supply a typed schema-1.0 narrowing policy to current runtime commands; there is no automatic root-file discovery.&lt;/td&gt;&lt;td class=&quot;planned-cell&quot;&gt;One automatically discovered root file with an explicit absence identity.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Authoring&lt;/td&gt;&lt;td class=&quot;current-cell&quot;&gt;The user/integrator must supply structured policy; there is no natural-language authoring skill.&lt;/td&gt;&lt;td class=&quot;planned-cell&quot;&gt;&lt;code&gt;$rb-create-safe-operation-policy&lt;/code&gt; converts natural language into a typed proposal, preview, and confirmed write.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Path rules&lt;/td&gt;&lt;td class=&quot;current-cell&quot;&gt;Root intersections and existing closed narrowing fields.&lt;/td&gt;&lt;td class=&quot;planned-cell&quot;&gt;Exact/subtree denials for read, create, modify, and delete, including adapter prerequisite and ancestor-effect checks.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Policy identity&lt;/td&gt;&lt;td class=&quot;current-cell&quot;&gt;Global and merged active-policy identities are bound.&lt;/td&gt;&lt;td class=&quot;planned-cell&quot;&gt;Retain global identity; add exact source-file identity and explicit effective merged identity throughout the artifact graph.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Agent tools&lt;/td&gt;&lt;td class=&quot;current-cell&quot;&gt;Role restrictions are instruction-only on the current Codex host.&lt;/td&gt;&lt;td class=&quot;planned-cell&quot;&gt;Pydantic AI may allocate role-specific toolsets after feasibility, provider, offline packaging, and adversarial capability tests pass.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Assurance wording&lt;/td&gt;&lt;td class=&quot;current-cell&quot;&gt;&lt;code&gt;instruction_only&lt;/code&gt;, &lt;code&gt;coordinator_observed&lt;/code&gt;, and host levels are reported honestly.&lt;/td&gt;&lt;td class=&quot;planned-cell&quot;&gt;Framework tool allocation is an orthogonal capability; it never satisfies an unrelated host-enforcement requirement.&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card callout planned&quot;&gt;
      &lt;p&gt;&lt;strong&gt;Pydantic versus Pydantic AI:&lt;/strong&gt; Pydantic remains the schema, parsing, and deterministic validation layer. Pydantic AI is only a candidate role runner for semantic work and framework-level tool allocation. Tool filtering would constrain calls made through that reviewed framework boundary; it would not become an operating-system sandbox or a complete effect trace.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;examples&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;14 · Worked examples&lt;/div&gt;
    &lt;h2&gt;What the process looks like in practice&lt;/h2&gt;

    &lt;details open&gt;
      &lt;summary&gt;Example A: a supported documentation patch&lt;/summary&gt;
      &lt;div&gt;
        &lt;ol&gt;
          &lt;li&gt;The selected phase says to update one documented workflow in &lt;code&gt;README.md&lt;/code&gt;.&lt;/li&gt;
          &lt;li&gt;The low-level plan declares the exact file, expected preimage, patch identity, intended modification, no network/subprocess use, and verifier checks.&lt;/li&gt;
          &lt;li&gt;Deterministic assessment confirms that &lt;code&gt;apply_patch&lt;/code&gt; is allowed, the path is contained, evidence exists, and no wider effect is declared.&lt;/li&gt;
          &lt;li&gt;The semantic assessor checks that the patch faithfully represents the phase and does not hide a policy or instruction change.&lt;/li&gt;
          &lt;li&gt;On &lt;code&gt;safe: true&lt;/code&gt;, execution re-hashes the complete plan and snapshot, acquires the lease, checks the preimage again, and applies only the approved patch.&lt;/li&gt;
          &lt;li&gt;The verifier compares the actual README state with the exact success criteria. The coordinator requires both observed state and verifier evidence before &lt;code&gt;verified&lt;/code&gt;.&lt;/li&gt;
        &lt;/ol&gt;
      &lt;/div&gt;
    &lt;/details&gt;

    &lt;details open&gt;
      &lt;summary&gt;Example B: a phase asks to run a test command&lt;/summary&gt;
      &lt;div&gt;
        &lt;p&gt;The current schema can represent &lt;code&gt;check&lt;/code&gt; and &lt;code&gt;exec_argv&lt;/code&gt;, but the immutable first-release policy disables them. The planner must emit an unsupported-operation diagnostic or the assessor must return &lt;code&gt;safe: false&lt;/code&gt;. It must not hide the command inside a “bounded coding task.” The user can use the standard route, revise the phase to supported work, or wait for a reviewed contained-command release.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/details&gt;

    &lt;details open&gt;
      &lt;summary&gt;Example C: the repository changes after assessment&lt;/summary&gt;
      &lt;div&gt;
        &lt;p&gt;The plan may still look sensible, but the snapshot or preimage no longer matches. &lt;code&gt;$rb-safe-operation&lt;/code&gt; stops before mutation. It does not overwrite the user’s change or silently update the approved hash. Material drift requires human review and usually a new plan/run identity with full reassessment.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/details&gt;

    &lt;details open&gt;
      &lt;summary&gt;Example D: planned “do not read or write x.txt” policy&lt;/summary&gt;
      &lt;div&gt;
        &lt;p&gt;The future authoring skill will interpret “write” as create, modify, and delete, making all four denials explicit. It will show the exact path and scope, explain the effect on current work, and ask the user to confirm the proposal hash. Once committed, planning, assessment, execution, repair, snapshotting, and verification must all respect the rule. If required evidence cannot be obtained without reading the file, the system stops; it does not weaken the policy.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/details&gt;
  &lt;/section&gt;

  &lt;section id=&quot;usage&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;15 · Practical use&lt;/div&gt;
    &lt;h2&gt;How a user invokes the process&lt;/h2&gt;
    &lt;p class=&quot;lead&quot;&gt;The user normally works through skills, not by manually constructing JSON or calling private dispatcher functions.&lt;/p&gt;

    &lt;pre class=&quot;code-block&quot;&gt;&lt;code&gt;1. Use $rb-create-implementation-plan for this work.
2. Choose Execution Route: constrained.
3. Use $rb-execute-plan to begin the next phase.

The coordinator then routes the phase through:
$rb-create-low-level-plan
→ $rb-assess-plan-safety
→ $rb-safe-operation (only for safe: true)&lt;/code&gt;&lt;/pre&gt;

    &lt;h3&gt;What the user sees at each boundary&lt;/h3&gt;
    &lt;div class=&quot;table-responsive&quot;&gt;
      &lt;table class=&quot;table table-sm&quot;&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Boundary&lt;/th&gt;&lt;th&gt;Visible result&lt;/th&gt;&lt;th&gt;Next action&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;Plan created&lt;/td&gt;&lt;td&gt;Phases, success criteria, and explicit route field.&lt;/td&gt;&lt;td&gt;Choose standard, constrained, or undecided.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Phase compiled&lt;/td&gt;&lt;td&gt;Human rendering of the canonical low-level plan and its hash.&lt;/td&gt;&lt;td&gt;Start fresh safety assessment.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Assessment false&lt;/td&gt;&lt;td&gt;FALSE, typed findings, invariant IDs, evidence, and remediation/human decision.&lt;/td&gt;&lt;td&gt;Revise/reassess, leave pipeline, or abandon.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Assessment true&lt;/td&gt;&lt;td&gt;TRUE for the exact fixed plan/assessment bundle paths and hashes.&lt;/td&gt;&lt;td&gt;Hand the unchanged bundle to safe operation.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Execution stop/pause&lt;/td&gt;&lt;td&gt;State, evidence, event head, limitations, and exact human/resume requirement.&lt;/td&gt;&lt;td&gt;Follow only the stated reviewed path.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Verified phase&lt;/td&gt;&lt;td&gt;Final verification report plus current and remaining phase handoff.&lt;/td&gt;&lt;td&gt;Stop; separately compile the next phase later.&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;

    &lt;h3&gt;Runtime setup boundary&lt;/h3&gt;
    &lt;p class=&quot;lead&quot;&gt;All three constrained skills use one runtime owned by &lt;code&gt;$rb-safe-operation&lt;/code&gt;. Setup is an explicit human-approved action using a reviewed offline wheelhouse and an absolute bootstrap Python. Normal operation never downloads, installs, searches ambient environments, or silently falls back. The manifest-pinned launcher runs with isolated Python flags and verifies source, lock, interpreter, launcher, and installed-package identities.&lt;/p&gt;

    &lt;h3&gt;How the shared CLI is divided&lt;/h3&gt;
    &lt;p class=&quot;lead&quot;&gt;The skills call these commands through the verified launcher. They are grouped by responsibility so that no single caller-supplied artifact can jump directly from prose to mutation.&lt;/p&gt;
    &lt;div class=&quot;table-responsive&quot;&gt;
      &lt;table class=&quot;table table-sm&quot;&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Command group&lt;/th&gt;&lt;th&gt;Commands&lt;/th&gt;&lt;th&gt;Use&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;Runtime identity&lt;/td&gt;&lt;td&gt;&lt;code&gt;runtime-info&lt;/code&gt;, &lt;code&gt;host-capabilities&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Prove which package and actual host profile are being used. Capability files are observed, not written from memory.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Strict artifacts&lt;/td&gt;&lt;td&gt;&lt;code&gt;validate&lt;/code&gt;, &lt;code&gt;canonicalize&lt;/code&gt;, &lt;code&gt;hash&lt;/code&gt;, &lt;code&gt;render&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Parse closed schemas, create deterministic bytes and identities, and derive human views from canonical JSON.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Planning evidence&lt;/td&gt;&lt;td&gt;&lt;code&gt;snapshot&lt;/code&gt;, &lt;code&gt;select-phase&lt;/code&gt;, &lt;code&gt;discover-instructions&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Bind the project state, one exact phase, and applicable repository instructions before compilation.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Policy&lt;/td&gt;&lt;td&gt;&lt;code&gt;merge-policy&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Apply the closed monotonic narrowing algebra; project input cannot widen the installed global baseline.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Assessment&lt;/td&gt;&lt;td&gt;&lt;code&gt;assess-preflight&lt;/code&gt;, &lt;code&gt;assess&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Run deterministic checks first, then recompute them while validating the semantic proposal and creating the fixed sanitized assessment bundle.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Fixed handoff&lt;/td&gt;&lt;td&gt;&lt;code&gt;persist-artifact&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Public persistence is deliberately limited to the fixed create-only low-level-plan handoff. There is no general “write any approved artifact” command.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Execution&lt;/td&gt;&lt;td&gt;&lt;code&gt;coordinate&lt;/code&gt;, &lt;code&gt;coordinate-resume&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Drive a new approved run or reload only a durably paused run while holding the lease and revalidating the full state.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Schemas&lt;/td&gt;&lt;td&gt;&lt;code&gt;export-schemas&lt;/code&gt;, &lt;code&gt;check-schema-drift&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Generate inspectable JSON Schemas and prove checked-in schema references still match the runtime models.&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;

    &lt;p class=&quot;lead&quot;&gt;There are deliberately no public artifact-only &lt;code&gt;execute&lt;/code&gt; or caller-asserted &lt;code&gt;verify&lt;/code&gt; commands. Mutation and final verification stay inside the coordinator that owns the lease, event chain, state observations, and exact context bindings.&lt;/p&gt;

    &lt;div class=&quot;card callout caution&quot;&gt;
      &lt;p&gt;Do not invoke the planned &lt;code&gt;$rb-create-safe-operation-policy&lt;/code&gt; yet. The reviewed plan exists, but implementation has not begun and its execution route is still &lt;code&gt;undecided&lt;/code&gt;.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;glossary&quot;&gt;
    &lt;div class=&quot;kicker&quot;&gt;16 · Glossary and evidence&lt;/div&gt;
    &lt;h2&gt;Short definitions&lt;/h2&gt;

    &lt;div class=&quot;table-responsive&quot;&gt;
      &lt;table class=&quot;table table-sm&quot;&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;Canonical artifact&lt;/td&gt;&lt;td&gt;A strictly validated object serialized in one deterministic form so its identity can be compared reliably.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Envelope&lt;/td&gt;&lt;td&gt;The closed set of goals, paths, tools, permissions, effects, limits, approvals, and verification conditions around an operation.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Project policy&lt;/td&gt;&lt;td&gt;A typed set of restrictions that may narrow—but never widen—the immutable global policy.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Snapshot&lt;/td&gt;&lt;td&gt;A typed observation of repository identity and state used to detect drift.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Preimage&lt;/td&gt;&lt;td&gt;The expected state of a target immediately before it is changed.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Lease&lt;/td&gt;&lt;td&gt;The one project-wide record that prevents two constrained runs from knowingly mutating the same project concurrently.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Control plane&lt;/td&gt;&lt;td&gt;Plans, policies, assessments, lifecycle state, audit events, verification, and continuity records.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Product plane&lt;/td&gt;&lt;td&gt;The repository or external target being changed to implement the phase.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Fail closed&lt;/td&gt;&lt;td&gt;Stop when required identity, evidence, permission, capability, or state cannot be established.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Semi-formal&lt;/td&gt;&lt;td&gt;Typed and deterministic controls are real, but some role restrictions and observations remain instruction-only or incomplete on the current host.&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;

    &lt;h3&gt;Authoritative project evidence used for this guide&lt;/h3&gt;
    &lt;ul&gt;
      &lt;li&gt;&lt;code&gt;rb-create-low-level-plan/SKILL.md&lt;/code&gt;&lt;/li&gt;
      &lt;li&gt;&lt;code&gt;rb-assess-plan-safety/SKILL.md&lt;/code&gt;&lt;/li&gt;
      &lt;li&gt;&lt;code&gt;rb-safe-operation/SKILL.md&lt;/code&gt; and &lt;code&gt;references/runtime-contract.md&lt;/code&gt;&lt;/li&gt;
      &lt;li&gt;&lt;code&gt;plans/2026-07-18-constrained-plan-execution/IMPLEMENTATION_PLAN.md&lt;/code&gt;&lt;/li&gt;
      &lt;li&gt;&lt;code&gt;plans/2026-07-18-constrained-plan-execution/references/&lt;/code&gt;&lt;/li&gt;
      &lt;li&gt;&lt;code&gt;plans/2026-07-18-constrained-plan-execution/evidence/phase-5/install-and-validation-report.md&lt;/code&gt;&lt;/li&gt;
      &lt;li&gt;&lt;code&gt;plans/2026-07-19-safe-operation-project-policy/IMPLEMENTATION_PLAN.md&lt;/code&gt; for the clearly marked planned extension&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;card callout safe&quot;&gt;
      &lt;p&gt;&lt;strong&gt;Release evidence at the reviewed snapshot:&lt;/strong&gt; runtime 0.1.0, schema 1.0, Pydantic 2.13.4, 113/113 source tests passing, 36/36 retained routing trials passing, generated schema drift clear, and disposable symlink/copy installs verified. These numbers describe the 19 July 2026 evidence snapshot; future releases should update this guide rather than treating the numbers as permanent.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;footer class=&quot;footer&quot;&gt;
    &lt;p&gt;Use this document as an explanation, not as an authorization artifact. Actual execution depends on the canonical plan, assessment, policy, capability, approval, snapshot, lease, runtime, and audit identities for the current run.&lt;/p&gt;
    &lt;p&gt;Prepared from the local RB skills source and release evidence. Current constrained workflow is implemented; project-root natural-language policy authoring is planned.&lt;/p&gt;
  &lt;/footer&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
